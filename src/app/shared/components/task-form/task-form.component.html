<div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-fade-in">
  <div class="bg-white w-full max-w-2xl rounded-[2.5rem] shadow-2xl overflow-hidden animate-zoom-in">
    
    <!-- Modal Header -->
    <div class="px-8 py-6 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
      <div class="flex items-center gap-4">
        <div class="p-3 bg-blue-600 text-white rounded-xl shadow-md">
          <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
        </div>
        <h2 class="text-xl font-black text-slate-800 uppercase tracking-tight">{{ task ? 'Edit Task' : 'Create New Task' }}</h2>
      </div>
      <button (click)="cancel()" class="p-2 hover:bg-slate-200 rounded-full transition-colors text-slate-600">
        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
      </button>
    </div>

    <!-- Modal Form -->
    <form (ngSubmit)="handleSubmit()" #f="ngForm" class="p-8 space-y-6">
      
      <!-- Project Selection -->
      <div class="space-y-2">
        <label class="text-[10px] font-black text-slate-600 uppercase tracking-widest ml-1">From Project *</label>
        <select name="projectId" [(ngModel)]="model.projectId" (change)="onProjectChange()" required 
                class="w-full bg-slate-50 border border-slate-100 rounded-2xl px-6 py-4 text-sm font-bold outline-none focus:border-blue-600 transition-all appearance-none cursor-pointer">
          <option *ngFor="let p of projects" [value]="p.id">{{ p.name }}</option>
          <option *ngIf="projects.length === 0" disabled>Loading projects...</option>
        </select>
      </div>

      <!-- Title -->
      <div class="space-y-2">
        <label class="text-[10px] font-black text-slate-600 uppercase tracking-widest ml-1">Task Title *</label>
        <input name="title" [(ngModel)]="model.title" required 
               class="w-full bg-slate-50 border border-slate-100 rounded-2xl px-6 py-4 text-sm font-bold outline-none focus:ring-4 focus:ring-blue-600/5 focus:border-blue-600 transition-all" 
               placeholder="What needs to be done?" />
      </div>

      <!-- Description -->
      <div class="space-y-2">
        <label class="text-[10px] font-black text-slate-600 uppercase tracking-widest ml-1">Detailed Description</label>
        <textarea name="description" [(ngModel)]="model.description" rows="4"
                  class="w-full bg-slate-50 border border-slate-100 rounded-2xl px-6 py-4 text-sm font-bold outline-none focus:ring-4 focus:ring-blue-600/5 focus:border-blue-600 transition-all resize-none" 
                  placeholder="Add details about this task..."> </textarea>
      </div>

      <!-- Assignees Section -->
      <div class="space-y-2">
        <label class="text-[10px] font-black text-slate-600 uppercase tracking-widest ml-1">Assign to Member</label>
        <select name="assigneeId" [(ngModel)]="model.assigneeId" 
                class="w-full bg-slate-50 border border-slate-100 rounded-2xl px-6 py-4 text-sm font-bold text-slate-700 outline-none focus:border-blue-600 transition-all appearance-none cursor-pointer
                bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20width=%2210%22%20height=%225%22%20viewBox=%220%200%2010%205%22%20xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cpath%20d=%22M0%200l5%205%205-5z%22%20fill=%22%2394a3b8%22/%3E%3C/svg%3E')] bg-no-repeat bg-[100%_center] bg-[length:12px_6px] bg-[position:right_20px_center]">
          <option [ngValue]="undefined">-- Unassigned --</option>
          <option *ngFor="let m of projectMembers" [ngValue]="m.user.id">{{ m.user.fullName || m.user.username }} (@{{ m.user.username }})</option>
          <option *ngIf="projectMembers.length === 0" disabled class="italic text-slate-600">{{ isLoadingMembers ? 'Loading members...' : 'No members available' }}</option>
        </select>
      </div>

      <!-- Metadata Row -->
      <div class="grid grid-cols-2 gap-6">
        <div class="space-y-2">
          <label class="text-[10px] font-black text-slate-600 uppercase tracking-widest ml-1">Status</label>
          <select name="status" [(ngModel)]="model.status" 
                  class="w-full bg-slate-50 border border-slate-100 rounded-2xl px-6 py-4 text-sm font-bold outline-none cursor-pointer appearance-none bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20width=%2210%22%20height=%225%22%20viewBox=%220%200%2010%205%22%20xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cpath%20d=%22M0%200l5%205%205-5z%22%20fill=%22%2394a3b8%22/%3E%3C/svg%3E')] bg-no-repeat bg-[100%_center] bg-[length:12px_6px] bg-[position:right_20px_center]">
            <option *ngFor="let s of statusOptions" [value]="s">{{ s }}</option>
          </select>
        </div>
        <div class="space-y-2">
          <label class="text-[10px] font-black text-slate-600 uppercase tracking-widest ml-1">Deadline & Time</label>
          <div class="relative w-full group">
            <input type="datetime-local" name="deadline" [(ngModel)]="model.deadline"
                   class="w-full bg-slate-50 border border-slate-100 rounded-2xl px-6 py-4 pr-12 text-sm font-bold outline-none focus:border-blue-600 transition-all cursor-pointer hover:bg-slate-100/50 appearance-none custom-datetime-input" />
            <div class="absolute right-6 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400 group-hover:text-blue-600 transition-colors">
              <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
              </svg>
            </div>
          </div>
        </div>
      </div>

      <!-- Error Message -->
      <p *ngIf="error" class="text-xs font-bold text-rose-500 bg-rose-50 p-3 rounded-xl border border-rose-100 animate-shake">
        {{ error }}
      </p>

      <!-- Footer Actions -->
      <div class="pt-6 border-t border-slate-100 flex justify-end gap-4">
        <button type="button" (click)="cancel()" class="px-8 py-4 text-slate-500 font-black rounded-2xl hover:bg-slate-100 transition-all uppercase text-[11px] tracking-widest">Cancel</button>
        <button type="submit" [disabled]="isSaving || !f.valid" 
                class="px-12 py-4 bg-blue-600 text-white font-black rounded-2xl shadow-xl shadow-blue-600/20 hover:scale-[1.02] transition-all active:scale-95 disabled:opacity-50 uppercase text-[11px] tracking-widest flex items-center gap-3">
          <div *ngIf="isSaving" class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
          {{ isSaving ? 'Saving...' : 'Confirm Save' }}
        </button>
      </div>
    </form>
  </div>
</div>
