<div class="flex flex-col items-center justify-center p-8 text-center bg-slate-50 border border-dashed border-slate-200 rounded-lg dark:bg-slate-900 dark:border-slate-800">
      <div class="rounded-full bg-slate-100 p-3 dark:bg-slate-800 mb-4 text-slate-500 dark:text-slate-400">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-6 w-6">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
      </div>
      <h3 class="text-sm font-semibold text-slate-900 dark:text-slate-50 mb-1">{{ title }}</h3>
      <p class="text-sm text-slate-500 dark:text-slate-400 max-w-sm">{{ description }}</p>
      
      <div *ngIf="hasAction" class="mt-4">
        <ng-content></ng-content>
      </div>
    </div>
