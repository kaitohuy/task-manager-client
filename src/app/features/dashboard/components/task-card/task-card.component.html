<div cdkDrag 
     [cdkDragData]="task"
     [ngStyle]="getCardBackground()"
     (click)="onClick.emit(task)"
     class="group relative rounded-xl overflow-hidden
            flex flex-col mb-3 p-4
            border
            shadow-[0_4px_12px_rgba(0,0,0,0.08)]
            hover:shadow-[0_8px_20px_rgba(0,0,0,0.12)]
            hover:-translate-y-1
            transition-all duration-200
            cursor-grab active:cursor-grabbing">

  <!-- CONTENT -->
  <div class="relative z-10 flex items-center justify-between">
    
    <!-- status -->
    <span class="px-2.5 py-0.5 bg-teal-500 text-white 
                 rounded-full text-[10px] font-bold uppercase tracking-wider shadow-sm">
      {{ getDeadlineStatusText() }}
    </span>
    <!-- actions -->
    <div class="flex items-center gap-1">
      <button (click)="onDeleteClick($event)" 
              class="p-1.5 rounded-full text-slate-700 hover:text-red-500 hover:bg-white/60 transition active:scale-95" title="Delete Task">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
        </svg>
      </button>

      <!-- settings -->
      <button (click)="onSettingsClick($event)" 
              class="p-1.5 rounded-full text-slate-700 hover:text-blue-600 hover:bg-white/60 transition active:scale-95" title="Task Settings">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- title -->
  <div class="relative z-10 mt-3 mb-1">
    <h4 class="text-[15px] font-extrabold uppercase text-slate-900 leading-tight line-clamp-2 tracking-tight">
      TASK: {{ task.title }}
    </h4>
  </div>

  <!-- description -->
  <div class="relative z-10 mb-2 flex-grow">
    <p *ngIf="task.description" class="text-[12.5px] text-slate-700 font-medium line-clamp-2 leading-relaxed">
      {{ task.description }}
    </p>
    <p *ngIf="!task.description" class="text-[12.5px] text-slate-500 italic">
      No description provided...
    </p>
  </div>

  <!-- footer -->
  <div class="relative z-10 flex justify-between mt-auto pt-2 border-t border-white/40">
    
    <!-- deadline -->
    <div class="flex flex-col">
      <span class="text-[10px] font-bold uppercase text-slate-600 tracking-wider mb-1">
        Deadline
      </span>
      <span class="text-[13px] font-extrabold text-slate-900 flex items-center h-6">
        {{ formatDeadline(deadlineDate) }}
      </span>
    </div>

    <!-- assignee -->
    <div *ngIf="task.assignee" class="flex flex-col items-end">
      <span class="text-[10px] font-bold uppercase text-slate-600 tracking-wider mb-1">
        {{ '@' + task.assignee.username }}
      </span>
      <div class="h-6 w-6 rounded-full border border-white shadow overflow-hidden shrink-0">
        <img [src]="getAssigneeAvatar()" class="w-full h-full object-cover">
      </div>
    </div>

  </div>
</div>
