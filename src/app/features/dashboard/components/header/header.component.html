<header class="h-16 bg-gradient-to-r from-blue-50 to-blue-100/80 border-b border-blue-200/80 flex items-center justify-between px-6 sticky top-0 z-50 shadow-sm">
  <!-- Left: Logo & Breadcrumbs -->
  <div class="flex items-center gap-5 min-w-0">
    <!-- Mobile Hamburger -->
    <button class="lg:hidden p-2 rounded-lg hover:bg-blue-100 text-slate-500 transition-colors">
      <svg class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" /></svg>
    </button>

    <div [routerLink]="basePath" class="flex items-center gap-3 cursor-pointer hover:opacity-80 transition-opacity">
      <div class="w-10 h-10 bg-[#0052cc] rounded-lg flex items-center justify-center shadow-sm">
        <svg class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" /></svg>
      </div>
      <span class="hidden md:block font-black text-slate-800 tracking-tight text-xl mb-0.5">Task Manager</span>
    </div>

    <div class="h-8 w-[1px] bg-blue-200 mx-3 hidden sm:block"></div>

    <!-- Breadcrumbs -->
    <nav class="hidden md:flex items-center text-base font-medium text-slate-500 overflow-hidden whitespace-nowrap pt-0.5">
      <a [routerLink]="basePath" class="hover:text-slate-900 text-slate-800 transition-colors">Board</a>
      <ng-container *ngIf="activeProjectName">
        <svg class="h-5 w-5 mx-1.5 text-slate-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
        <span class="text-slate-900 font-semibold truncate">{{ activeProjectName }}</span>
      </ng-container>
    </nav>
  </div>

  <!-- Center: Search -->
  <div class="hidden lg:flex items-center flex-1 max-w-lg mx-10">
    <div class="relative w-full group">
      <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 h-5 w-5 text-slate-400 group-focus-within:text-[#0052cc] transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
      <input type="text" 
             [ngModel]="searchQuery"
             (ngModelChange)="onSearch.emit($event)"
             placeholder="Search tasks, projects..." 
             class="w-full bg-white/70 border border-blue-200 rounded-lg py-2.5 pl-11 pr-5 text-base focus:outline-none focus:bg-white focus:ring-2 focus:ring-[#0052cc]/20 focus:border-[#0052cc]/60 transition-all" />
    </div>
  </div>

  <!-- Right: Actions -->
  <div class="flex items-center gap-3">

    <!-- Create Button with Dropdown -->
    <div class="relative hidden sm:block" *ngIf="!isMember">
      <button (click)="toggleCreateDropdown($event)"
              class="flex items-center gap-2 bg-[#0052cc] hover:bg-[#0747a6] text-white px-4 py-2 rounded-lg text-base font-bold transition-all shadow-sm active:scale-95">
        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" /></svg>
        <span>Create</span>
        <svg class="h-3.5 w-3.5 transition-transform duration-200" [class.rotate-180]="isCreateDropdownOpen" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" /></svg>
      </button>
      <!-- Create Dropdown -->
      <div *ngIf="isCreateDropdownOpen"
           class="absolute right-0 mt-2 w-44 bg-white rounded-xl shadow-xl border border-slate-100 py-1.5 z-50 animate-fade-in">
        <button (click)="onCreateTaskClick()"
                class="w-full flex items-center gap-3 px-4 py-2.5 text-sm font-semibold text-slate-700 hover:bg-blue-50 hover:text-[#0052cc] transition-colors">
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" /></svg>
          Task
        </button>
        <button (click)="onCreateProjectClick()"
                class="w-full flex items-center gap-3 px-4 py-2.5 text-sm font-semibold text-slate-700 hover:bg-blue-50 hover:text-[#0052cc] transition-colors">
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" /></svg>
          Project
        </button>
      </div>
    </div>

    <div class="flex items-center ml-1 space-x-1">
      <!-- Notifications -->
      <div class="relative">
        <button (click)="toggleNotificationDropdown($event)"
                class="p-2.5 text-slate-500 hover:bg-blue-100 rounded-lg transition-colors relative group" 
                title="Notifications">
          <svg class="h-6 w-6 group-hover:text-[#0052cc] transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" /></svg>
          <span *ngIf="notificationService.unreadCount() > 0" 
                class="absolute top-1.5 right-1.5 bg-red-600 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full border-2 border-white leading-none flex items-center justify-center animate-pulse-fast shadow-sm">
            {{ notificationService.unreadCount() }}
          </span>
        </button>

        <!-- Notifications Dropdown -->
        <div *ngIf="isNotificationDropdownOpen"
             class="absolute right-0 top-12 w-80 sm:w-96 bg-white rounded-2xl shadow-2xl border border-slate-100 z-50 overflow-hidden animate-fade-in">
          <div class="p-4 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
            <h3 class="text-sm font-black text-slate-800 uppercase tracking-wider">Notifications</h3>
            <div class="flex items-center gap-3">
              <button *ngIf="notificationService.unreadCount() > 0"
                      (click)="markAllAsRead($event)"
                      class="text-[11px] font-bold text-[#0052cc] hover:text-[#0747a6] uppercase tracking-tight transition-colors">
                Mark All
              </button>
              <button *ngIf="notificationService.notifications().length > 0"
                      (click)="deleteAllNotifications($event)"
                      class="text-[11px] font-bold text-red-500 hover:text-red-700 uppercase tracking-tight transition-colors">
                Delete All
              </button>
            </div>
          </div>

          <div class="max-h-[min(450px,70vh)] overflow-y-auto">
            <div *ngIf="notificationService.notifications().length === 0" class="p-10 text-center">
              <div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="h-8 w-8 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" /></svg>
              </div>
              <p class="text-sm font-bold text-slate-800">No notifications yet</p>
              <p class="text-xs text-slate-400 mt-1">We'll let you know when something happens.</p>
            </div>

            <app-notification-item 
              *ngFor="let n of notificationService.notifications()" 
              [notification]="n"
              (navigate)="handleNotificationClick($event)"
              (delete)="onDeleteNotification($event)">
            </app-notification-item>
          </div>

          <div *ngIf="notificationService.notifications().length > 0" class="p-3 border-t border-slate-100 bg-slate-50/30 text-center">
            <button class="text-xs font-bold text-slate-500 hover:text-slate-800 transition-colors">View all activity</button>
          </div>
        </div>
      </div>

      <div class="h-8 w-[1px] bg-blue-200 mx-1"></div>

      <!-- User Avatar with Dropdown -->
      <div class="relative flex items-center">
        <!-- Avatar (click = go to profile page directly) -->
        <button (click)="goToProfile()"
                class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center border-2 border-blue-200 overflow-hidden shadow-sm hover:border-[#0052cc] transition-all"
                title="View Profile">
          <img *ngIf="currentUser?.gender" [src]="userAvatarUrl" class="w-full h-full object-cover" [alt]="currentUser?.fullName">
          <span *ngIf="!currentUser?.gender" class="text-sm font-bold text-[#0052cc]">{{ currentUser?.username?.slice(0,2)?.toUpperCase() }}</span>
        </button>
        <!-- Down arrow = open dropdown -->
        <button (click)="toggleProfileDropdown($event)"
                class="ml-1 p-1 rounded-full hover:bg-blue-100 transition-colors"
                title="Account options">
          <svg class="h-4 w-4 text-slate-500 transition-transform duration-200" [class.rotate-180]="isProfileDropdownOpen" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7" /></svg>
        </button>

        <!-- Profile Dropdown -->
        <div *ngIf="isProfileDropdownOpen"
             class="absolute right-0 top-12 w-48 bg-white rounded-xl shadow-xl border border-slate-100 py-1.5 z-50">
          <div class="px-4 py-2 border-b border-slate-100 mb-1">
            <p class="text-sm font-bold text-slate-800 truncate">{{ currentUser?.fullName || currentUser?.username }}</p>
            <p class="text-xs text-slate-500 truncate">{{ currentUser?.email }}</p>
          </div>
          <button (click)="goToProfile()"
                  class="w-full flex items-center gap-3 px-4 py-2.5 text-sm font-semibold text-slate-700 hover:bg-blue-50 hover:text-[#0052cc] transition-colors">
            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
            Profile
          </button>
          <button (click)="onLogoutClick()"
                  class="w-full flex items-center gap-3 px-4 py-2.5 text-sm font-semibold text-red-500 hover:bg-red-50 transition-colors">
            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
            Logout
          </button>
        </div>
      </div>
    </div>
  </div>
</header>
