<aside [class]="isCollapsed ? 'w-[68px]' : 'w-[260px]'" 
       class="h-full bg-gradient-to-b from-blue-50/80 to-blue-100/50 border-r border-blue-200/80 flex flex-col transition-all duration-300 relative z-40">
  
  <!-- Header: Collapse Toggle ONLY -->
  <div class="h-[60px] flex items-center px-4 border-b border-blue-200/50">
    <button (click)="toggleSidebar()" 
            class="ml-auto p-2 rounded-md hover:bg-blue-100 text-slate-500 transition-colors"
            [title]="isCollapsed ? 'Expand' : 'Collapse'">
      <svg [class.rotate-180]="isCollapsed" class="h-5 w-5 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M11 19l-7-7 7-7m8 14l-7-7 7-7" /></svg>
    </button>
  </div>

  <!-- Content: Nav Links (Flat List) -->
  <div class="flex-1 overflow-y-auto custom-scrollbar pt-2 pb-5 px-4">
    <div class="space-y-0.5">
      <!-- Everyday Work -->
      <a [routerLink]="basePath + '/board'" routerLinkActive="nav-link-active" [routerLinkActiveOptions]="{exact: true}"
         class="flex items-center gap-3 px-3 py-2.5 rounded-md text-[14px] font-semibold text-slate-800 hover:bg-blue-100/60 hover:text-[#0052cc] transition-all group">
        <svg class="h-6 w-6 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" /></svg>
        <span *ngIf="!isCollapsed" class="truncate">Board</span>
      </a>

      <a *ngIf="!isAdmin" [routerLink]="basePath + '/my-tasks'" routerLinkActive="nav-link-active"
         class="flex items-center gap-3 px-3 py-2.5 rounded-md text-[14px] font-semibold text-slate-800 hover:bg-blue-100/60 hover:text-[#0052cc] transition-all group relative">
        <svg class="h-6 w-6 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" /></svg>
        <span *ngIf="!isCollapsed" class="truncate">My Tasks</span>
        <span *ngIf="!isCollapsed && taskCount > 0" class="ml-auto bg-red-500 text-white text-[10px] px-1.5 rounded-full py-0.5 font-bold shadow-sm">{{ taskCount }}</span>
      </a>

      <a [routerLink]="basePath + '/calendar'" routerLinkActive="nav-link-active"
         class="flex items-center gap-3 px-3 py-2.5 rounded-md text-[14px] font-semibold text-slate-800 hover:bg-blue-100/60 hover:text-[#0052cc] transition-all group">
        <svg class="h-6 w-6 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
        <span *ngIf="!isCollapsed" class="truncate">Calendar</span>
      </a>

      <a [routerLink]="basePath + '/meetings'" routerLinkActive="nav-link-active"
         class="flex items-center gap-3 px-3 py-2.5 rounded-md text-[14px] font-semibold text-slate-800 hover:bg-blue-100/60 hover:text-[#0052cc] transition-all group">
        <svg class="h-6 w-6 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>
        <span *ngIf="!isCollapsed" class="truncate">Meetings</span>
      </a>

      <a [routerLink]="basePath + '/projects'" routerLinkActive="nav-link-active"
         class="flex items-center gap-3 px-3 py-2.5 rounded-md text-[14px] font-semibold text-slate-800 hover:bg-blue-100/60 hover:text-[#0052cc] transition-all cursor-pointer group">
        <svg class="h-6 w-6 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" /></svg>
        <span *ngIf="!isCollapsed" class="truncate">Projects</span>
      </a>

      <!-- Administration Divider -->
      <div *ngIf="isAdmin || isManager" class="h-[1px] bg-blue-200/50 my-3"></div>

      <!-- Management & Admin items -->
      <a *ngIf="isAdmin" [routerLink]="basePath + '/users'" routerLinkActive="nav-link-active"
         class="flex items-center gap-3 px-3 py-2.5 rounded-md text-[14px] font-semibold text-slate-800 hover:bg-blue-100/60 hover:text-[#0052cc] transition-all group">
        <svg class="h-6 w-6 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
        <span *ngIf="!isCollapsed" class="truncate">Users Center</span>
      </a>

      <a *ngIf="isManager" class="flex items-center gap-3 px-3 py-2.5 rounded-md text-[14px] font-semibold text-slate-400 hover:bg-blue-100/60 transition-all group opacity-60 cursor-not-allowed">
        <svg class="h-6 w-6 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z" /></svg>
        <span *ngIf="!isCollapsed" class="truncate">Gantt Chart</span>
      </a>

      <a *ngIf="isAdmin" class="flex items-center gap-3 px-3 py-2.5 rounded-md text-[14px] font-semibold text-slate-400 hover:bg-blue-100/60 transition-all group opacity-60 cursor-not-allowed">
        <svg class="h-6 w-6 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
        <span *ngIf="!isCollapsed" class="truncate">Security Settings</span>
      </a>

      <!-- Activity Logs -->
      <a [routerLink]="basePath + '/logs'" routerLinkActive="nav-link-active"
         class="flex items-center gap-3 px-3 py-2.5 rounded-md text-[14px] font-semibold text-slate-800 hover:bg-blue-100/60 hover:text-[#0052cc] transition-all group">
        <svg class="h-6 w-6 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
        </svg>
        <span *ngIf="!isCollapsed" class="truncate">Activity Logs</span>
      </a>
    </div>
  </div>

  <!-- Footer: User Context -->
  <div class="p-5 border-t border-blue-200/80 space-y-1">
    
    <a [routerLink]="profilePath" routerLinkActive="nav-link-active" 
       class="flex items-center gap-3 p-2.5 rounded-lg hover:bg-blue-100/60 transition-colors cursor-pointer group">
      <div class="w-9 h-9 rounded-full bg-blue-100 flex items-center justify-center shrink-0 border border-blue-200 shadow-sm relative overflow-hidden">
        <svg class="h-5 w-5 text-slate-500 group-hover:text-[#0052cc] z-10 relative transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
      </div>
      <span *ngIf="!isCollapsed" class="text-base font-bold text-slate-800 group-hover:text-[#0052cc] truncate transition-colors">Profile</span>
    </a>
    <div (click)="handleLogout()" 
         class="flex items-center gap-3 p-2.5 rounded-lg hover:bg-blue-100/60 transition-colors cursor-pointer group">
      <div class="w-9 h-9 rounded-full bg-blue-100 flex items-center justify-center shrink-0 border border-blue-200 shadow-sm relative overflow-hidden">
        <svg class="h-5 w-5 text-slate-500 group-hover:text-red-500 z-10 relative transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
      </div>
      <span *ngIf="!isCollapsed" class="text-base font-bold text-slate-800 group-hover:text-red-600 truncate transition-colors">Logout</span>
    </div>
  </div>
</aside>
