<div class="h-full flex flex-col bg-[#fcfcfd] relative overflow-hidden">
  <!-- Premium Workspace Header -->
  <header class="px-8 pt-8 pb-4 shrink-0">

    <!-- Navigation Tabs -->
    <div class="flex items-center gap-8 border-b border-slate-100">
      <button (click)="setActiveTab('ALL')" 
              class="pb-4 px-1 text-[14px] font-bold flex items-center gap-2 transition-all"
              [ngClass]="activeTab === 'ALL' ? 'text-slate-900 border-b-2 border-slate-900' : 'text-slate-400 hover:text-slate-600'">
        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
        All Scheduled
      </button>
      <button (click)="setActiveTab('MEETINGS')" 
              class="pb-4 px-1 text-[14px] font-bold flex items-center gap-2 transition-all"
              [ngClass]="activeTab === 'MEETINGS' ? 'text-indigo-600 border-b-2 border-indigo-600' : 'text-slate-400 hover:text-slate-600'">
        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>
        Meetings
      </button>
      <button (click)="setActiveTab('TASKS')" 
              class="pb-4 px-1 text-[14px] font-bold flex items-center gap-2 transition-all"
              [ngClass]="activeTab === 'TASKS' ? 'text-blue-600 border-b-2 border-blue-600' : 'text-slate-400 hover:text-slate-600'">
        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" /></svg>
        Task Reminders
      </button>

      <div class="ml-auto pb-4 flex items-center gap-3 w-full max-w-2xl justify-end">
        <div class="relative group flex-1 max-w-md">
          <input type="text" placeholder="Search tasks or meetings..." 
                 class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-2 text-[13px] font-bold outline-none focus:ring-2 focus:ring-blue-600/10 focus:border-blue-600 transition-all pl-10 ring-4 ring-slate-50">
          <svg class="h-4 w-4 absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
        </div>
        
        <div class="flex items-center gap-2 shrink-0">
          <button (click)="taskService.requestCreateTask()" class="px-4 py-2.5 bg-sky-500 text-white rounded-xl shadow-lg shadow-sky-500/20 hover:bg-sky-600 transition-all flex items-center gap-2">
            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path d="M12 6v6m0 0v6m0-6h6m-6 0H6" /></svg>
            <span class="text-[13px] font-bold">New Task</span>
          </button>
          <button (click)="meetingService.requestCreateMeeting()" class="px-4 py-2.5 bg-indigo-600 text-white rounded-xl shadow-lg shadow-indigo-600/10 hover:bg-indigo-700 transition-all flex items-center gap-2">
            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>
            <span class="text-[13px] font-bold">New Meeting</span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <div class="flex-1 px-8 pb-8 overflow-hidden flex flex-col">
    <div class="flex-1 bg-white border border-slate-100 rounded-3xl overflow-hidden p-6 custom-fc-wrapper shadow-xl shadow-slate-200/40">
      <full-calendar [options]="calendarOptions()"></full-calendar>
    </div>
  </div>

  <!-- Detail Panel Overlays -->
  <app-task-detail-panel
    *ngIf="selectedTask"
    [task]="selectedTask"
    (closePanel)="selectedTask = null">
  </app-task-detail-panel>

  <app-meeting-detail-panel
    *ngIf="selectedMeeting"
    [meeting]="selectedMeeting"
    (closePanel)="selectedMeeting = null">
  </app-meeting-detail-panel>
</div>
