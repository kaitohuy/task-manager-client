<div class="h-full flex flex-col bg-slate-50 relative animate-fade-in" *ngIf="!isLoading && project">
  
  <!-- Workspace Header -->
  <div class="bg-white border-b border-slate-200 px-4 lg:px-8 pt-4 flex flex-col lg:flex-row lg:items-end justify-between gap-y-4 shrink-0 z-10 sticky top-0 shadow-sm">
    
    <!-- Left Side: Breadcrumb & Tabs -->
    <div class="flex flex-col lg:flex-row lg:items-end gap-x-8 gap-y-2">
      <!-- Breadcrumb -->
      <nav class="flex text-sm text-slate-500 font-medium whitespace-nowrap pb-0 lg:pb-4">
        <a routerLink="../../projects" class="hover:text-blue-600 transition-colors">Projects</a>
        <span class="mx-2 text-slate-300">/</span>
        <span class="text-slate-900 font-bold truncate max-w-xs">{{ project.name }}</span>
      </nav>
      
      <!-- Navigation Tabs -->
      <div class="flex gap-8">
        <a routerLink="board" routerLinkActive="!text-blue-600 !border-blue-600" 
           [routerLinkActiveOptions]="{exact: true}"
           class="pb-4 text-sm font-bold text-slate-500 border-b-2 border-transparent hover:text-slate-800 transition-colors cursor-pointer uppercase tracking-wider relative group -mb-[1px]">
          Board
          <div class="absolute bottom-[-2px] left-0 w-full h-[2px] bg-blue-600 scale-x-0 group-hover:scale-x-100 transition-transform origin-left pointer-events-none"></div>
        </a>
        
        <a routerLink="members" routerLinkActive="!text-blue-600 !border-blue-600" 
           [routerLinkActiveOptions]="{exact: true}"
           class="pb-4 text-sm font-bold text-slate-500 border-b-2 border-transparent hover:text-slate-800 transition-colors cursor-pointer uppercase tracking-wider relative group -mb-[1px]">
          Members
          <div class="absolute bottom-[-2px] left-0 w-full h-[2px] bg-blue-600 scale-x-0 group-hover:scale-x-100 transition-transform origin-left pointer-events-none"></div>
        </a>
      </div>
    </div>
    
    <!-- Right side: Team & Actions -->
    <div class="flex items-center gap-6 pb-4">
      <!-- Avatar Stack -->
      <div class="flex items-center gap-2 hidden sm:flex">
        <div class="flex -space-x-3 overflow-visible">
          <!-- Show up to 3 avatars -->
          <div *ngFor="let m of members.slice(0, 3); let i = index" 
               class="relative group/avatar cursor-pointer hover:scale-110 transition-transform"
               [style.z-index]="50 - i">
            <!-- Avatar Circle -->
            <div class="h-8 w-8 rounded-full border-2 border-white bg-slate-100 flex items-center justify-center shadow-sm overflow-hidden">
              <img *ngIf="m.user.imageUrl" [src]="m.user.imageUrl" class="w-full h-full object-cover">
              <ng-container *ngIf="!m.user.imageUrl">
                <img *ngIf="m.user.gender === 'FEMALE'" src="/images/female_avatar.png" class="w-full h-full object-cover">
                <img *ngIf="m.user.gender !== 'FEMALE'" src="/images/male_avatar.png" class="w-full h-full object-cover">
              </ng-container>
            </div>
            <!-- Tooltip -->
            <div class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 px-2.5 py-1.5 bg-[#172b4d] text-white text-[10px] font-bold rounded-md opacity-0 group-hover/avatar:opacity-100 transition-all duration-200 transform translate-y-2 group-hover/avatar:translate-y-0 whitespace-nowrap pointer-events-none shadow-xl flex flex-col items-center">
              <div class="absolute top-[90%] left-1/2 -translate-x-1/2 border-[5px] border-transparent border-t-[#172b4d]"></div>
              {{ m.user.username }}
            </div>
          </div>
          
          <!-- Extra count -->
          <div *ngIf="members.length > 3" 
               [style.z-index]="10"
               class="h-8 w-8 rounded-full border-2 border-white bg-slate-50 flex items-center justify-center text-[10px] font-black text-slate-600 shadow-sm relative z-0">
            +{{ members.length - 3 }}
          </div>
        </div>
      </div>

      <!-- Action Button -->
      <button *ngIf="!isMember"
              (click)="openTaskModal()" 
              class="bg-blue-600 text-white px-4 py-2 rounded-xl font-bold text-sm hover:bg-blue-700 transition-all shadow-md shadow-blue-600/20 active:scale-95 flex items-center gap-2 whitespace-nowrap">
        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
        </svg>
        Create Task
      </button>
    </div>
  </div>

  <!-- Workspace Content Area -->
  <div class="flex-1 overflow-auto bg-slate-50 relative">
    <div class="w-full h-full p-4 lg:p-8 mx-auto">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>

<!-- Loading State -->
<div *ngIf="isLoading" class="h-full flex items-center justify-center bg-slate-50 text-slate-400">
  <div class="flex flex-col items-center gap-4">
    <svg class="animate-spin h-8 w-8 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
    </svg>
    <p class="text-sm font-bold uppercase tracking-widest text-slate-500">Loading Workspace...</p>
  </div>
</div>
